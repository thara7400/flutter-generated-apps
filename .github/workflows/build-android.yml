name: Flutter Android APK

on:
  workflow_dispatch:
  push:
    branches: [master]
  repository_dispatch:
    types: [build-flutter-apk]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.38.10'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run Flutter analyze
        run: flutter analyze --no-fatal-warnings

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Distribute to Firebase
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: demo-testers
          file: build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: |
            Build: ${{ env.BUILD_RUN_ID }}
            Trigger: ${{ github.event_name }}
            Commit: ${{ github.sha }}
        env:
          BUILD_RUN_ID: ${{ github.run_id }}

      - name: Notify Hono server (success)
        if: success()
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          RUN_ID: ${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          INVITE_URL: https://appdistribution.firebase.google.com/
        run: |
          curl -X POST "${WEBHOOK_URL}/api/webhook/build-complete" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WEBHOOK_SECRET}" \
            -d "{
              \"runId\": ${RUN_ID},
              \"commitSha\": \"${COMMIT_SHA}\",
              \"status\": \"success\",
              \"inviteUrl\": \"${INVITE_URL}\",
              \"message\": \"Build completed\"
            }"

      - name: Notify Hono server (failure)
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          RUN_ID: ${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          curl -X POST "${WEBHOOK_URL}/api/webhook/build-complete" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WEBHOOK_SECRET}" \
            -d "{
              \"runId\": ${RUN_ID},
              \"commitSha\": \"${COMMIT_SHA}\",
              \"status\": \"failure\",
              \"errorMessage\": \"Build failed in workflow\"
            }"
